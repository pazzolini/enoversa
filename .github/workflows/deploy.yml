name: Quality and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: enoversa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Check, E2E and Lighthouse
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22.12.0'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Audit production dependencies
      run: npm run audit:production

    - name: Validate content and Astro
      run: npm run check

    - name: Build site
      run: npm run build

    - name: Install Chromium
      run: npx playwright install --with-deps chromium

    - name: Run end-to-end tests
      run: npm run test:e2e

    - name: Run Lighthouse budgets
      run: npm run test:lighthouse

    - name: Store production build
      if: github.event_name == 'push'
      uses: actions/upload-artifact@v7
      with:
        name: production-site
        path: dist/
        include-hidden-files: true
        retention-days: 1

  deploy:
    name: Deploy to Hostinger
    if: github.event_name == 'push'
    needs: quality
    runs-on: ubuntu-latest

    steps:
    - name: Download validated build
      uses: actions/download-artifact@v8
      with:
        name: production-site
        path: dist/

    - name: Sync to Hostinger via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.4.0
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./dist/
        server-dir: ./domains/enoversa.com/public_html/
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          legacy/**
